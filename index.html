                    <div class="gsm1"><i class="fa fa-phone-square"></i> 040425550</div>
                    <div class="name2">Odvetnica Meta Rojko</div>
                    <div class="gsm2"><i class="fa fa-phone-square"></i> 040425550</div>

            </div>
            <div class="googleMap">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2794.511790921735!2d13.704617516174059!3d45.54002917910195!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x477b68a92b2a9ced%3A0xcaaecdc6d2994c36!2sUlica%20ob%20parku%202%2C%206000%20Koper%20-%20Capodistria!5e0!3m2!1ssl!2ssi!4v1608828163387!5m2!1ssl!2ssi" width="400" height="250" frameborder="0" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe></map>

                    <input type="text"name="subjectClient" class="text-box" placeholder="Zadeva">
                    <textarea name="message" rows="5" class="text-area" placeholder="Vaše sporočilo" required></textarea>
                    <input type="submit"name="submit" class="send-btn" value="Pošlji">
                    
                    
                    
                </form>
